<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="quill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="60%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Quill feather: curved diagonal shape from bottom-left to top-right -->
  <path d="M140 380 C160 340 200 300 250 270 C300 240 340 200 360 160 C370 140 375 120 372 100 C368 85 355 80 340 85 C310 95 270 130 230 170 C190 210 160 260 145 310 C138 330 135 360 140 380 Z" fill="url(#quill)"/>
  <!-- Feather spine (central rib) -->
  <path d="M148 372 C170 330 210 290 260 255 C310 220 345 185 365 150 L370 140 L365 145 C340 180 305 215 255 250 C205 285 165 325 150 365 Z" fill="#1E3A8A" opacity="0.3"/>
  <!-- Feather barbs (small lines along the spine) -->
  <line x1="155" y1="365" x2="175" y2="345" stroke="#1E3A8A" stroke-width="2" opacity="0.2"/>
  <line x1="165" y1="345" x2="190" y2="320" stroke="#1E3A8A" stroke-width="2" opacity="0.2"/>
  <line x1="180" y1="320" x2="210" y2="290" stroke="#1E3A8A" stroke-width="2" opacity="0.2"/>
  <line x1="200" y1="295" x2="230" y2="265" stroke="#1E3A8A" stroke-width="2" opacity="0.2"/>
  <line x1="225" y1="265" x2="255" y2="235" stroke="#1E3A8A" stroke-width="2" opacity="0.2"/>
  <line x1="255" y1="235" x2="285" y2="205" stroke="#1E3A8A" stroke-width="2" opacity="0.2"/>
  <line x1="285" y1="205" x2="315" y2="175" stroke="#1E3A8A" stroke-width="2" opacity="0.2"/>
  <line x1="315" y1="175" x2="340" y2="150" stroke="#1E3A8A" stroke-width="2" opacity="0.2"/>
  <!-- Nib/writing tip at bottom-left -->
  <path d="M135 385 L145 375 L155 385 L145 395 Z" fill="#FBBF24"/>
  <!-- Small yellow ink dot for accent -->
  <circle cx="145" cy="390" r="4" fill="#FBBF24"/>
</svg>
